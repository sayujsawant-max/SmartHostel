name: Lint Stories

on:
  pull_request:
    paths:
      - '_bmad-output/stories/**'
      - 'scripts/lint-stories.mjs'

jobs:
  lint-stories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint story documents
        run: node scripts/lint-stories.mjs
