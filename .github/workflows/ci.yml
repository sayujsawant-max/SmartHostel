name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-that-is-at-least-32-chars!!
      QR_SECRET: ci-test-qr-secret-at-least-32-chars!!
      ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build all workspaces
        run: npm run build

      - name: Server tests
        run: npm -w server test

      - name: Client tests
        run: npm -w client test
