services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: smarthostel:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/smarthostel
      - ALLOWED_ORIGINS=http://localhost:5000
    depends_on:
      mongo:
        condition: service_healthy

  worker:
    image: smarthostel:latest
    restart: unless-stopped
    command: ["node", "server/dist/worker/index.js"]
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/smarthostel
      - CRON_ENABLED=true
    depends_on:
      api:
        condition: service_started
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
